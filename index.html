<!DOCTYPE html>
<html>
<head>
    <title>Bifrost Bridge</title>
</head>
<body>
    <script>
        // This function will run as soon as the about:blank page opens
        function launch() {
            const target = "https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA@main/singlefile.html";
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(target);

            console.log("Fetching payload...");

            fetch(proxy)
                .then(response => response.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(error => {
                    document.body.innerHTML = "<h2>Bridge Failed: Check Connection</h2>";
                    console.error('Error:', error);
                });
        }

        // Call the function immediately
        launch();
    </script>
</body>
</html>
