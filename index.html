<!DOCTYPE html>
<html>
<head>
    <title>Bifrost Bridge</title>
</head>
<body>
    <script>
        // We wrap the logic in a script tag so the browser executes it
        function launch() {
            // Your target math site
            const target = "https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA@main/singlefile.html";
            
            // We use AllOrigins because CorsProxy is now restricted
            const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(target);

            console.log("Fetching payload...");

            fetch(proxy)
                .then(response => response.text())
                .then(html => {
                    // This clears the 'about:blank' page and injects the site
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(error => {
                    document.body.innerHTML = "<h2>Bridge Failed: Connection Refused</h2>";
                    console.error('Error:', error);
                });
        }

        // This line tells the browser: "Run this the moment the page opens!"
        launch();
    </script>
</body>
</html>
